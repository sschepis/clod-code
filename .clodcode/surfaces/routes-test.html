<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes Test</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; background: #1e1e1e; color: #cccccc; }
        h1 { color: #ffffff; }
        button { padding: 10px 15px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 4px; font-size: 14px; }
        button:hover { background: #1177bb; }
        pre { background: #000000; padding: 15px; border-radius: 4px; overflow-x: auto; border: 1px solid #333; }
        code { color: #ce9178; }
    </style>
</head>
<body>
    <h1>Routes Test Surface</h1>
    <p>This surface tests the local API routing capability.</p>
    <p>Routes Base URL: <code id="baseUrl"></code></p>
    
    <button id="fetchBtn">Fetch /api/hello</button>
    
    <pre id="output">Waiting for action...</pre>

    <script>
        // Clodcode injects the local server URL into window.__CLODCODE_ROUTES_URL__
        const baseUrl = window.__CLODCODE_ROUTES_URL__ || 'Not defined (server might not be running)';
        document.getElementById('baseUrl').innerText = baseUrl;

        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const output = document.getElementById('output');
            
            if (!window.__CLODCODE_ROUTES_URL__) {
                output.innerText = 'Error: window.__CLODCODE_ROUTES_URL__ is not set.';
                return;
            }
            
            output.innerText = 'Fetching /hello...';
            
            try {
                // FIX: The base URL already includes the /api prefix, so we just fetch /hello
                const res = await fetch(`${window.__CLODCODE_ROUTES_URL__}/hello`);
                const text = await res.text();
                
                try {
                    // Try to format as JSON if possible
                    const json = JSON.parse(text);
                    output.innerText = JSON.stringify(json, null, 2);
                } catch (e) {
                    // Fallback to raw text
                    output.innerText = text;
                }
            } catch (err) {
                output.innerText = 'Fetch error: ' + err.message;
            }
        });
    </script>
</body>
</html>
