<!--
Entropic Circuits VS Code Extension Icon
Theme: Minimalist, geometric, entropy/circuit/target motif
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="g" cx="64" cy="64" r="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffbe6"/>
      <stop offset="100%" stop-color="#f7c873"/>
    </radialGradient>
    <linearGradient id="circuit" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#6e4aff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="64" cy="64" r="62" fill="url(#g)" stroke="#e0e0e0" stroke-width="4"/>
  <!-- Entropy motif: radiating lines -->
  <g stroke="url(#circuit)" stroke-width="3">
    <line x1="64" y1="18" x2="64" y2="38"/>
    <line x1="64" y1="90" x2="64" y2="110"/>
    <line x1="18" y1="64" x2="38" y2="64"/>
    <line x1="90" y1="64" x2="110" y2="64"/>
    <line x1="36" y1="36" x2="50" y2="50"/>
    <line x1="92" y1="36" x2="78" y2="50"/>
    <line x1="36" y1="92" x2="50" y2="78"/>
    <line x1="92" y1="92" x2="78" y2="78"/>
  </g>
  <!-- Central target: concentric circles -->
  <circle cx="64" cy="64" r="20" fill="none" stroke="#6e4aff" stroke-width="4"/>
  <circle cx="64" cy="64" r="8" fill="#6e4aff"/>
  <!-- Circuit lines: minimalist geometric motif -->
  <g stroke="#2d2d2d" stroke-width="2">
    <polyline points="64,38 64,54 78,64" fill="none"/>
    <polyline points="64,90 64,74 50,64" fill="none"/>
  </g>
</svg>
